# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Common.SmartCache Package Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 6.0.x

    - name: Setup NuGet.exe for use with actions
      # You may pin to the exact commit or the version.
      # uses: NuGet/setup-nuget@296fd3ccf8528660c91106efefe2364482f86d6f
      uses: NuGet/setup-nuget@v1.2.0
      with:
        nuget-api-key: ${{ secrets.NUGET_API_KEY }}
        nuget-version: 'latest'
        # Source to scope the NuGet API Key to.
        # nuget-api-key-source: # optional
    
    - name: Get build number
      id: get_build_number
      run: echo "BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> $GITHUB_ENV
    
    - name: Set Assembly Version
      run: |
        $env:ASSEMBLY_VERSION="1.0.$env:BUILD_NUMBER"
        Write-Host "Setting assembly version to: $env:ASSEMBLY_VERSION"
        (Get-Content Common.SmartCache/Common.SmartCache.csproj) -replace '<Version>.*<\/Version>', "<Version>$env:ASSEMBLY_VERSION<\/Version>" | Set-Content Common.SmartCache/Common.SmartCache.csproj
    #- name: Set Assembly Version
    #  run: |
    #    ASSEMBLY_VERSION="1.0.$BUILD_NUMBER"
    #    echo "Setting assembly version to: $ASSEMBLY_VERSION"
    #    sed -i "s/<Version>.*<\/Version>/<Version>$ASSEMBLY_VERSION<\/Version>/" Common.SmartCache/Common.SmartCache.csproj

    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build DLL
      run: dotnet build Common.SmartCache/Common.SmartCache.csproj --configuration Release --no-restore
      
    - name: Publish DLL
      run: dotnet publish Common.SmartCache/Common.SmartCache.csproj --configuration Release --output ./publish --no-build
      
    #- name: Upload Artifact
    #  uses: actions/upload-artifact@v2
    #  with:
    #    name: dll-artifact
    #    path: ./publish

    #- name: Create NuGet package
    #  run: dotnet pack --no-build --include-symbols -o ./nupkg
    #  working-directory: ./Common.SmartCache/bin/Debug
      
    # - name: Publish NuGet package
    #   uses: nuget/publish@1.0.0
    #   with:
    #     nuget-api-key: ${{ secrets.NUGET_API_KEY }}
    #     nuget-version: 'latest'

    - name: Test
      run: dotnet test --no-build --verbosity normal
